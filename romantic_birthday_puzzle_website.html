
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Ayush ❤️</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#ffd6e0,#ffe6f0);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:420px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1,h2{ color:#ff4d6d; }

button{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:15px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

button:hover{ background:#ff3355; }

.feedback{
  margin-top:10px;
  color:#ff4d6d;
  font-size:14px;
}

.puzzle{
  width:300px;
  height:300px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
}

.tile{
  width:100px;
  height:100px;
  cursor:pointer;
  transition:0.3s;
}

.tile:hover{
  transform:scale(0.95);
}
</style>
</head>

<body>

<div class="container" id="app">
  <h1>🎂 Happy Birthday Ayush ❤️</h1>
  <p>A tiny surprise made with lots of love 💌</p>
  <button onclick="startQuiz()">Start 💖</button>
</div>

<script>

/////////////////////////
// QUIZ
/////////////////////////

const questions = [
{
q:"When did you first start liking me? 💖",
options:[
"The moment I saw you 👀",
"When we started talking 💬",
"When you made me smile 🥺",
"I’ve always liked you 😌"
],
correct:1
},
{
q:"Which moment of ours is your favorite? 🥹",
options:[
"First meeting 👀",
"Basement Chaos 🌙",
"Our first khuchupuu 😂",
"Every moment with you 💖"
],
correct:3
},
{
q:"What did I wore when we first met in BLR? 😏",
options:[
"Black top and beige pant 🥺",
"Black top and Denim Jeans 😂",
"Green top and Black Pant ❤️",
"White shirt and Black Pant 💖"
],
correct:2
},
{
q:"How much do you love me? 💕",
options:[
"A little 🤏",
"A lot 💖",
"Too much 😌",
"Infinity ♾️"
],
correct:3,
final:true
}
];

let current=0;

function startQuiz(){ showQuestion(); }

function showQuestion(){
const app=document.getElementById("app");
const q=questions[current];

let html=`<h2>${q.q}</h2>`;
q.options.forEach((opt,i)=>{
html+=`<button onclick="answer(${i})">${opt}</button>`;
});

html+=`<div class="feedback" id="feedback"></div>`;
app.innerHTML=html;
}

function answer(i){
const q=questions[current];
const fb=document.getElementById("feedback");

if(i===q.correct){
fb.innerText="Yayyy correct 😌💖";

setTimeout(()=>{
if(q.final){
showLoveScreen();
}else{
current++;
showQuestion();
}
},700);

}else{
fb.innerText="Nooo 😤 think again bubuu 💔";
}
}

function showLoveScreen(){
document.getElementById("app").innerHTML=`
<h2>Correct answer: Infinity only 😤❤️</h2>
<p>You passed the love test bubuu 🥺💖</p>
<button onclick="startPuzzle()">Final Surprise 💖</button>
`;
}

/////////////////////////
// TAP TO REVEAL
/////////////////////////

const img="image.jpeg";
let revealed = Array(9).fill(false);

function startPuzzle(){
document.getElementById("app").innerHTML=`
<h2>Tap to reveal something special 💖</h2>
<div class="puzzle" id="puzzle"></div>
`;
renderPuzzle();
}

function renderPuzzle(){
const puzzle=document.getElementById("puzzle");
puzzle.innerHTML="";

revealed.forEach((isOpen,idx)=>{
const tile=document.createElement("div");
tile.className="tile";

if(isOpen){
tile.style.backgroundImage=`url(${img})`;
tile.style.backgroundSize="300px 300px";
tile.style.backgroundPosition=
`${(idx%3)*-100}px ${Math.floor(idx/3)*-100}px`;
}else{
tile.style.background="#ff4d6d";
tile.innerHTML="💖";
tile.style.display="flex";
tile.style.alignItems="center";
tile.style.justifyContent="center";
tile.style.color="white";
tile.style.fontSize="20px";
}

tile.onclick=()=>revealTile(idx);
puzzle.appendChild(tile);
});
}

function revealTile(index){
revealed[index]=true;
renderPuzzle();

if(revealed.every(v=>v)){
setTimeout(()=>{
showFinalMessage();
},500);
}
}

/////////////////////////
// FINAL CLEAN SCREEN
/////////////////////////

function showFinalMessage(){
document.body.innerHTML = `
<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #e6a4a4, #f5c6c6);
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.final-container {
  max-width: 600px;
  text-align: center;
  color: white;
  padding: 20px;
  line-height: 1.8;
}

.final-title {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 25px;
}

.final-text {
  font-size: 16px;
  opacity: 0.95;
}
</style>

<div class="final-container">
  <div class="final-title">You unlocked my heart 💖</div>

  <div class="final-text">
    Hey Aayu,<br><br>

    From that random moment in the college basement to our first night in Bangalore… every second with you has felt like something out of a dream.<br><br>

    I don’t just like you… I crave your presence, your voice, your chaos, your calm… all of you. You’re my comfort, my excitement, my favorite distraction 💕<br><br>

    And honestly… if I had to choose again, I’d still choose you. Every single time.<br><br>

    Happy Birthday bubuu ❤️
  </div>
</div>
`;
}

</script>

</body>
</html>
